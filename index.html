<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>

  <!-- FUENTES -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #2a2a2a 0%, #000 80%);
      color: #E5E5E5;
      text-align: center;
      font-family: "Cormorant Garamond", serif;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3rem);
      font-family: "Playfair Display", serif;
    }

    .pantalla {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    button {
      background: transparent;
      color: #E5E5E5;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 12px 25px;
      cursor: pointer;
    }

    /* PORTÓN */
    #porton {
      position: fixed;
      width: 100%;
      height: 100%;
      display: flex;
      z-index: 999;
    }

    .puerta {
      width: 50%;
      height: 100%;
      background: linear-gradient(
        90deg,
        #0a0a0a 0%,
        #1a1a1a 20%,
        #2a2a2a 50%,
        #1a1a1a 80%,
        #0a0a0a 100%
      );
      border: 1px solid rgba(255,255,255,0.08);
      transition: transform 2s ease;
    }

    .izquierda {
      transform-origin: left;
    }

    .derecha {
      transform-origin: right;
    }

    #porton::after {
      content: "";
      position: absolute;
      width: 3px;
      height: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.15);
    }
  </style>
</head>

<body>

<!-- PORTÓN -->
<div id="porton">
  <div class="puerta izquierda"></div>
  <div class="puerta derecha"></div>
</div>

<!-- ENTRADA -->
<section class="pantalla">
  <h1>Invitado</h1>
  <button onclick="abrir()">Abrir invitación</button>
</section>

<script>
function abrir(){
  const izq = document.querySelector(".izquierda");
  const der = document.querySelector(".derecha");

  izq.style.transform = "translateX(-100%)";
  der.style.transform = "translateX(100%)";
}
</script>

</body>
</html>
