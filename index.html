<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">
  
 <style>
  body {
    margin: 0;
    background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
    color: #E5E5E5;
    text-align: center;
    font-family: "Cinzel", serif;
  }

  .pantalla {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }

  h1 {
    font-size: 2.8em;
    letter-spacing: 2px;
    text-shadow: 0 0 12px rgba(255,255,255,0.25);
    margin-bottom: 10px;
    font-family: "Playfair Display", serif;
  }

  .vino {
    color: #6b112f;
    font-size: 1.3em;
    margin-bottom: 30px;
  }

  p {
    margin: 10px 0;
    font-family: "Cormorant Garamond", serif;
    font-size: 1.2em;
  }

  button {
    background: linear-gradient(145deg, #bbb, #eee);
    color: #000;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    font-size: 1em;
    border-radius: 5px;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px rgba(255,255,255,0.4);
  }

  #contenido {
    display: none;
    padding: 50px 20px;
    animation: fadeIn 2s ease forwards;
  }
   #nombre {
  font-family: "Great Vibes", cursive;
  font-size: 2.5em;
  color: #E5E5E5;
   }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  #contador {
    margin-top: 20px;
    font-size: 1.3em;
    color: #C0C0C0;
  }
</style>
</head>

<body>

<!-- Pantalla inicial -->
<div class="pantalla" id="inicio">
  <h1 id="saludo">Invitación</h1>
  <button onclick="abrir()">Abrir invitación</button>
</div>

<!-- Contenido -->
<div id="contenido">
  <h1 id="nombre"></h1>
  <p class="vino">Estás cordialmente invitado</p>

  <p>📅 20 de Noviembre 2026</p>
  <p>📍 Salón estilo castillo</p>

  <p id="contador"></p>

  <button onclick="confirmar()">Confirmar asistencia</button>
</div>

<script>
  // LISTA DE INVITADOS
  const invitados = {
    "a1": "Ana López",
    "b2": "Luis Martínez"
  };

  // OBTENER ID
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");

  let nombre = "Invitado";

  if(invitados[id]){
    nombre = invitados[id];
  }

  document.getElementById("saludo").textContent = "Querido/a " + nombre;
  document.getElementById("nombre").textContent = nombre;

  function abrir(){
    document.getElementById("inicio").style.display = "none";
    document.getElementById("contenido").style.display = "block";
  }

  // Cuenta regresiva
  const fecha = new Date("2026-11-20");

  setInterval(() => {
    const ahora = new Date();
    const diff = fecha - ahora;

    const dias = Math.floor(diff / (1000*60*60*24));
    document.getElementById("contador").textContent =
      dias + " días para el evento";
  }, 1000);

  function confirmar(){
    alert("Aquí conectaremos Firebase después 😏");
  }
</script>

</body>
</html>
