<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invitación</title>

  <!-- FUENTES -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cormorant+Garamond:wght@300;400&family=Great+Vibes&display=swap" rel="stylesheet">

  <!-- PRELOAD IMAGEN -->
  <link rel="preload" as="image" href="puertas3.webp" fetchpriority="high">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #222 0%, #000 80%);
      color: #E5E5E5;
      text-align: center;
      font-family: "Cormorant Garamond", serif;
    }

    h1 {
      font-size: clamp(2.2rem, 6vw, 3rem);
      text-shadow: 0 0 12px rgba(255,255,255,0.25);
      font-family: "Playfair Display", serif;
      margin-bottom: 10px;
    }

    h2 {
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-family: "Playfair Display", serif;
      margin-bottom: 20px;
      letter-spacing: 3px;
    }

    #saludo {
      opacity: 0.8;
    }

    p {
      margin: 10px 0;
      font-size: clamp(1.1rem, 4vw, 1.3rem);
    }

    #nombre {
      font-family: "Great Vibes", cursive;
      font-size: clamp(2.5rem, 8vw, 3rem);
    }

    .pantalla {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
    }

    .seccion {
      padding: 60px 20px;
    }

    #contenido {
      display: none;
      padding-top: 20px;
    }

    button {
      background: linear-gradient(145deg, #bbb, #eee);
      color: #000;
      border: none;
      padding: 12px 30px;
      cursor: pointer;
      font-size: 1em;
      border-radius: 5px;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255,255,255,0.4);
    }

    #inicio button {
      margin-top: 20px;
      background: transparent;
      color: #E5E5E5;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 10px 22px;
      font-size: 0.9rem;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
    }

    #inicio button:hover {
      background: rgba(255,255,255,0.1);
    }

    #contador {
      margin-top: 20px;
      font-size: 1.3em;
      color: #C0C0C0;
    }

    #btnConfirmar {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(255,255,255,0.08);
      color: #E5E5E5;
      border: 1px solid rgba(255,255,255,0.2);
      padding: 6px 12px;
      font-size: 0.7rem;
      border-radius: 4px;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #btnConfirmar:hover {
      background: rgba(255,255,255,0.2);
    }

    @media (max-width: 600px) {
      .seccion {
        padding: 40px 15px;
      }

      button {
        width: 90%;
        max-width: 300px;
      }
    }

    #puertas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: flex;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.6s ease;
      perspective: 1200px;
    }

    #puertas.loaded {
      opacity: 1;
    }

    .puerta {
      width: 50%;
      height: 100%;
      background-image: url("puertas3.webp");
      background-size: 200% 100%;
      background-repeat: no-repeat;
      transition: transform 1.2s cubic-bezier(0.77, 0, 0.175, 1);
      backface-visibility: hidden;
      will-change: transform;
      transform: translateZ(0);
      filter: brightness(0.92) contrast(1.08);
    }

    .izquierda {
      background-position: left;
      transform-origin: left;
    }

    .derecha {
      background-position: right;
      transform-origin: right;
    }

    #inicio {
      position: relative;
      overflow: hidden;
      perspective: 1200px;
    }
  </style>
</head>

<body>

<section id="inicio" class="pantalla">
  <h2 id="saludo">Invitado</h2>
  <button onclick="abrir()">Abrir invitación</button>

  <div id="puertas">
    <div class="puerta izquierda"></div>
    <div class="puerta derecha"></div>
  </div>
</section>

<main id="contenido">
  <section class="seccion">
    <h1 id="nombre"></h1>
    <p>Tenemos el honor de invitarte a celebrar este momento tan especial con nosotros</p>
    <p id="contador"></p>
  </section>
</main>

<button id="btnConfirmar" onclick="irConfirmacion()">
  Ir a confirmación
</button>

<script>
  // 🔥 Precarga inteligente
  const img = new Image();
  img.src = "puertas3.webp";

  img.onload = () => {
    document.getElementById("puertas").classList.add("loaded");
  };

  const invitados = {
    "a1": "Ana López",
    "b2": "Luis Martínez"
  };

  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  const nombre = invitados[id] || "Invitado";

  document.getElementById("saludo").innerHTML = "Para:<br>" + nombre;
  document.getElementById("nombre").textContent = nombre;

  const fecha = new Date("2026-11-20");

  setInterval(() => {
    const ahora = new Date();
    const diff = fecha - ahora;
    const dias = Math.floor(diff / (1000*60*60*24));
    document.getElementById("contador").textContent =
      dias + " días para el evento";
  }, 60000);

  function abrir(){
    const izquierda = document.querySelector(".izquierda");
    const derecha = document.querySelector(".derecha");

    izquierda.style.transform = "rotateY(-95deg)";
    derecha.style.transform = "rotateY(95deg)";

    setTimeout(() => {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("contenido").style.display = "block";

      const btn = document.getElementById("btnConfirmar");
      btn.style.opacity = "1";
      btn.style.pointerEvents = "auto";
    }, 1200);
  }

  function irConfirmacion(){
    document.getElementById("confirmacion")?.scrollIntoView({
      behavior: "smooth"
    });
  }

  function confirmar(){
    alert("Aquí irá Firebase 😏");
  }
</script>

</body>
</html>
